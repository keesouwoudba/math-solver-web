<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SymPy LaTeX Render</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>

<body>

  <h2>Solution for X3:</h2>
  <div id="math-container"></div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // This is the raw string your Python backend/SymPy generated
      // Note: In JS, you must escape backslashes, so \frac becomes \\frac
      const sympyLatex = "- \\frac{\\left(- \\frac{27 y}{2} - 297 + \\frac{\\sqrt{\\left(- 27 y - 594\\right)^{2} + 296352}}{2}\\right)^{1/3}}{3} + \\frac{14}{\\left(- \\frac{27 y}{2} - 297 + \\frac{\\sqrt{\\left(- 27 y - 594\\right)^{2} + 296352}}{2}\\right)^{1/3}}";

      const container = document.getElementById('math-container');

      // Render it! 
      // displayMode: true centers it on its own line. Use false for inline text.
      katex.render(sympyLatex, container, {
        displayMode: false,
        throwOnError: false
      });
    });
  </script>
</body>

</html>
