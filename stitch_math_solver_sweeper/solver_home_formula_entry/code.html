<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Solver Home Screen - MathSolver</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;family=Newsreader:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d4e3ff",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#7ba7ff",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface": "#f7f9fb",
                        "tertiary-fixed": "#d8e2ff",
                        "secondary-fixed": "#6ffbbe",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary": "#0f2846",
                        "surface-container-low": "#f2f4f6",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#002558",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "primary-fixed-dim": "#b1c8ee",
                        "on-primary-container": "#92a9ce",
                        "inverse-primary": "#b1c8ee",
                        "on-secondary-container": "#00714d",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#44474e",
                        "primary-container": "#273e5d",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "outline": "#74777e",
                        "tertiary-container": "#003a82",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#001c39",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-tint": "#495f80",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "secondary": "#006c49",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#002113",
                        "surface-container": "#eceef0",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#314867",
                        "outline-variant": "#c4c6ce",
                        "on-tertiary-fixed": "#001a42",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#e0e3e5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "1rem",
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "sm": "0.5rem",
                        "base": "4px",
                        "xs": "0.25rem",
                        "container-margin": "clamp(1rem, 5vw, 2.5rem)",
                        "grid-gutter": "1rem"
                    },
                    "fontFamily": {
                        "keypad-label": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2-ui": ["Space Grotesk"],
                        "h1-ui": ["Space Grotesk"],
                        "math-inline": ["Newsreader"],
                        "body-main": ["Inter"],
                        "display-math": ["Newsreader"]
                    },
                    "fontSize": {
                        "keypad-label": ["1.25rem", {"lineHeight": "1", "fontWeight": "500"}],
                        "label-caps": ["0.75rem", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h2-ui": ["1.5rem", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "h1-ui": ["2rem", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "math-inline": ["1.125rem", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-main": ["1rem", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "display-math": ["2.5rem", {"lineHeight": "1.2", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .key-press:active {
            transform: translateY(2px);
        }
        /* Focus state for rapid keyboard nav */
        button:focus-visible, input:focus-visible {
            outline: 2px solid #004395; /* on-tertiary-fixed-variant approx for scientific blue */
            outline-offset: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body-main antialiased min-h-screen flex flex-col md:flex-row">
<!-- NavigationDrawer (Hidden on Mobile, Flex on Desktop) -->
<nav class="hidden md:flex flex-col fixed left-0 top-0 h-screen z-40 h-full w-64 border-r border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-none bg-white dark:bg-slate-950">
<div class="p-6 border-b border-slate-200 dark:border-slate-800">
<h1 class="text-lg font-bold text-slate-900 dark:text-white font-['Space_Grotesk'] font-medium text-blue-600 dark:text-blue-400">Menu</h1>
</div>
<div class="p-4 flex-1 overflow-y-auto space-y-2">
<!-- Active Tab: Solver -->
<a class="flex items-center gap-3 px-4 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 rounded-lg Active: scale-95 duration-150 group" href="#">
<span class="material-symbols-outlined" data-icon="calculate" style="font-variation-settings: 'FILL' 1;">calculate</span>
<span class="font-['Space_Grotesk'] font-medium">Solver</span>
</a>
<!-- Inactive Tab: Sweeper -->
<a class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors group" href="#">
<span class="material-symbols-outlined" data-icon="cleaning_services">cleaning_services</span>
<span class="font-['Space_Grotesk'] font-medium">Sweeper</span>
</a>
</div>
</nav>
<!-- Main Content Wrapper (Adjusts for desktop nav) -->
<div class="flex-1 flex flex-col md:ml-64 min-h-screen">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows bg-slate-50 dark:bg-slate-900 sticky z-30">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-800 dark:text-slate-100" data-icon="function" style="font-variation-settings: 'FILL' 1;">function</span>
<span class="text-xl font-bold text-slate-900 dark:text-white font-['Space_Grotesk'] tracking-tight">MathSolver</span>
</div>
<button class="text-slate-800 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors px-3 py-1.5 rounded-DEFAULT Active: opacity-80 transition-all font-body-main text-body-main">
                Help
            </button>
</header>
<!-- Main Workspace Canvas -->
<main class="flex-1 flex flex-col p-container-margin w-full max-w-4xl mx-auto gap-lg">
<!-- Input Area Card -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-xl flex flex-col gap-sm flex-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="formula-input">Workspace</label>
<!-- Auto-expanding input simulation via textarea -->
<textarea class="w-full h-full bg-transparent border-0 border-l-[3px] border-transparent focus:border-tertiary-container focus:ring-0 resize-none font-display-math text-display-math text-on-surface placeholder:text-outline-variant p-0 pl-sm focus:pl-3 transition-all duration-200" id="formula-input" placeholder="Enter your formula (e.g., S = v * t)" rows="4"></textarea>
</div>
<!-- Custom Keypad Container -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-sm mt-auto shadow-[0px_4px_20px_rgba(15,23,42,0.05)]">
<div class="grid grid-cols-5 gap-sm">
<!-- Row 1 -->
<button class="h-10 bg-surface-container-high border border-outline-variant rounded-DEFAULT text-on-surface-variant font-keypad-label text-sm key-press transition-transform">sin</button>
<button class="h-10 bg-surface-container-high border border-outline-variant rounded-DEFAULT text-on-surface-variant font-keypad-label text-sm key-press transition-transform">cos</button>
<button class="h-10 bg-surface-container-high border border-outline-variant rounded-DEFAULT text-on-surface-variant font-keypad-label text-sm key-press transition-transform">tan</button>
<button class="h-10 bg-surface-container-high border border-outline-variant rounded-DEFAULT text-on-surface-variant font-keypad-label text-sm key-press transition-transform">log</button>
<button class="h-10 bg-surface-container-high border border-outline-variant rounded-DEFAULT text-on-surface-variant font-keypad-label text-sm key-press transition-transform">ln</button>
<!-- Row 2 -->
<button class="h-10 bg-tertiary-fixed border border-outline-variant rounded-DEFAULT text-on-tertiary-fixed font-math-inline text-math-inline key-press transition-transform flex items-center justify-center">π</button>
<button class="h-10 bg-tertiary-fixed border border-outline-variant rounded-DEFAULT text-on-tertiary-fixed font-math-inline text-math-inline key-press transition-transform flex items-center justify-center">e</button>
<button class="h-10 bg-surface-container border border-outline-variant rounded-DEFAULT text-on-surface font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">(</button>
<button class="h-10 bg-surface-container border border-outline-variant rounded-DEFAULT text-on-surface font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">)</button>
<button class="h-10 bg-primary border border-transparent rounded-DEFAULT text-on-primary font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">**</button>
<!-- Row 3 -->
<button class="h-10 bg-primary border border-transparent rounded-DEFAULT text-on-primary font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">+</button>
<button class="h-10 bg-primary border border-transparent rounded-DEFAULT text-on-primary font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">-</button>
<button class="h-10 bg-primary border border-transparent rounded-DEFAULT text-on-primary font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">*</button>
<button class="h-10 bg-primary border border-transparent rounded-DEFAULT text-on-primary font-keypad-label text-keypad-label key-press transition-transform flex items-center justify-center">/</button>
<button class="h-10 bg-surface-container-highest border border-tertiary-container rounded-DEFAULT text-tertiary-container font-keypad-label text-xs uppercase key-press transition-transform flex flex-col items-center justify-center gap-0.5">
<span class="material-symbols-outlined text-sm">backspace</span>
</button>
<!-- Row 4 -->
<button class="h-10 bg-surface-container-highest border border-tertiary-container rounded-DEFAULT text-tertiary-container font-keypad-label text-sm uppercase col-span-3 key-press transition-transform flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">delete</span> Clear
                    </button>
<button class="h-10 bg-secondary border border-transparent rounded-DEFAULT text-on-secondary font-keypad-label text-sm col-span-2 key-press transition-transform flex items-center justify-center">SOLVE</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 px-6 mt-auto flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50 dark:bg-slate-900 full-width border-t border-slate-200 dark:border-slate-800 flat no shadows font-['Space_Grotesk'] text-sm">
<div class="text-slate-500 dark:text-slate-400 text-sm font-semibold text-slate-700 dark:text-slate-300">
                © 2024 MathSolver. Clinical Precision.
            </div>
<div class="flex gap-4 flex-wrap justify-center">
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Documentation</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Privacy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Terms</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">API</a>
</div>
</footer>
</div>
</body></html>
