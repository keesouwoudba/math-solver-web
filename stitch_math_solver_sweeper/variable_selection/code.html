<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MathSolver - Variable Selection</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:wght@400&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d4e3ff",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#7ba7ff",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface": "#f7f9fb",
                        "tertiary-fixed": "#d8e2ff",
                        "secondary-fixed": "#6ffbbe",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary": "#0f2846",
                        "surface-container-low": "#f2f4f6",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#002558",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "primary-fixed-dim": "#b1c8ee",
                        "on-primary-container": "#92a9ce",
                        "inverse-primary": "#b1c8ee",
                        "on-secondary-container": "#00714d",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#44474e",
                        "primary-container": "#273e5d",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "outline": "#74777e",
                        "tertiary-container": "#003a82",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#001c39",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-tint": "#495f80",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "secondary": "#006c49",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#002113",
                        "surface-container": "#eceef0",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#314867",
                        "outline-variant": "#c4c6ce",
                        "on-tertiary-fixed": "#001a42",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#e0e3e5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "1rem",
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "sm": "0.5rem",
                        "base": "4px",
                        "xs": "0.25rem",
                        "container-margin": "clamp(1rem, 5vw, 2.5rem)",
                        "grid-gutter": "1rem"
                    },
                    "fontFamily": {
                        "keypad-label": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2-ui": ["Space Grotesk"],
                        "h1-ui": ["Space Grotesk"],
                        "math-inline": ["Newsreader"],
                        "body-main": ["Inter"],
                        "display-math": ["Newsreader"]
                    },
                    "fontSize": {
                        "keypad-label": ["1.25rem", { "lineHeight": "1", "fontWeight": "500" }],
                        "label-caps": ["0.75rem", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2-ui": ["1.5rem", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "h1-ui": ["2rem", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "math-inline": ["1.125rem", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-main": ["1rem", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-math": ["2.5rem", { "lineHeight": "1.2", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen flex flex-col font-body-main text-body-main selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- TopAppBar -->
    <header
        class="bg-slate-50 dark:bg-slate-900 docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows font-['Space_Grotesk'] tracking-tight">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span aria-hidden="true" class="material-symbols-outlined text-slate-800 dark:text-slate-100"
                    data-icon="function">function</span>
                <span class="text-xl font-bold text-slate-900 dark:text-white">MathSolver</span>
            </div>
            <div>
                <button
                    class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors px-4 py-2 rounded flex items-center gap-2 Active: opacity-80 transition-all text-sm font-medium">
                    Help
                </button>
            </div>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="grow flex flex-col items-center justify-center p-container-margin w-full max-w-7xl mx-auto">
        <div
            class="w-full max-w-2xl bg-surface-container-lowest border border-outline-variant rounded-xl p-xl flex flex-col gap-xl">
            <!-- Formula Display -->
            <div class="text-center py-lg bg-surface-container rounded-lg border border-outline-variant mx-12">
                <span class="font-label-caps text-label-caps text-on-surface-variant block mb-2">CURRENT FORMULA</span>
                <div class="font-display-math text-display-math text-on-surface">
                    S = v · t
                </div>
            </div>
            <!-- Variable Selection -->
            <div class="flex flex-col gap-md">
                <h1 class="font-h1-ui text-h1-ui text-center text-on-surface">Choose Variable<br>to Solve For</h1>
                <p class="text-center text-on-surface-variant max-w-md mx-auto">Select the variable you want to isolate.
                    The engine will rearrange the equation accordingly.</p>

                <fieldset class="grid grid-cols-3 gap-md mt-lg mx-12">
                    <legend class="sr-only">Variables</legend>
                    <!-- Variable S -->
                    <label
                        class="relative flex flex-col items-center justify-center py-xl bg-surface border-2 border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors cursor-pointer has-[:checked]:bg-primary-fixed has-[:checked]:border-primary has-[:checked]:shadow-[0px_4px_20px_rgba(15,23,42,0.05)] group">
                        <input type="radio" name="variable" value="S" class="peer sr-only">
                        <span
                            class="font-math-inline text-display-math text-on-surface group-has-[:checked]:text-primary mb-2">S</span>
                    </label>

                    <!-- Variable v (Selected State) -->
                    <label
                        class="relative flex flex-col items-center justify-center py-xl bg-surface border-2 border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors cursor-pointer has-[:checked]:bg-primary-fixed has-[:checked]:border-primary has-[:checked]:shadow-[0px_4px_20px_rgba(15,23,42,0.05)] group">
                        <input type="radio" name="variable" value="v" class="peer sr-only" checked>
                        <span
                            class="font-math-inline text-display-math text-on-surface group-has-[:checked]:text-primary mb-2">v</span>
                    </label>

                    <!-- Variable t -->
                    <label
                        class="relative flex flex-col items-center justify-center py-xl bg-surface border-2 border-outline-variant rounded-xl hover:bg-surface-container-high transition-colors cursor-pointer has-[:checked]:bg-primary-fixed has-[:checked]:border-primary has-[:checked]:shadow-[0px_4px_20px_rgba(15,23,42,0.05)] group">
                        <input type="radio" name="variable" value="t" class="peer sr-only">
                        <span
                            class="font-math-inline text-display-math text-on-surface group-has-[:checked]:text-primary mb-2">t</span>
                    </label>
                </fieldset>
            </div>
            <!-- Actions -->
            <div class="flex justify-between items-center mt-lg pt-lg border-t border-outline-variant mx-12">
                <button
                    class="flex items-center gap-2 px-6 py-3 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-primary">
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                    Back
                </button>
                <button
                    class="flex items-center gap-2 px-8 py-3 rounded-lg bg-secondary text-on-secondary hover:bg-on-secondary-fixed-variant transition-colors font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 active:translate-y-[2px]">
                    Solve
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
                </button>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer
        class="bg-slate-50 dark:bg-slate-900 full-width border-t border-slate-200 dark:border-slate-800 flat no shadows font-['Space_Grotesk'] text-sm w-full py-8 px-6 mt-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-sm font-semibold text-slate-700 dark:text-slate-300">
            © 2024 MathSolver. Clinical Precision.
        </div>
        <nav class="flex gap-6">
            <a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="#">Documentation</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="#">Privacy</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="#">Terms</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="#">API</a>
        </nav>
    </footer>
</body>

</html>
