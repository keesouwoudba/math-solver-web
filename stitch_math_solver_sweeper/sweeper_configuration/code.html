<!DOCTYPE html>

<title>MathSolver - Sweeper Configuration</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary": "#0f2846",
                        "surface-container-low": "#f2f4f6",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-tertiary-fixed-variant": "#004395",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary": "#002558",
                        "surface-bright": "#f7f9fb",
                        "background": "#f7f9fb",
                        "primary-fixed-dim": "#b1c8ee",
                        "on-primary-container": "#92a9ce",
                        "inverse-primary": "#b1c8ee",
                        "on-secondary-container": "#00714d",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#44474e",
                        "primary-container": "#273e5d",
                        "error": "#ba1a1a",

                        "outline": "#74777e",

                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-tint": "#495f80",
                        "surface-container-high": "#e6e8ea",
                        "on-background": "#191c1e",
                        "secondary": "#006c49",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#002113",
                        "surface-container": "#eceef0",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#314867",
                        "outline-variant": "#c4c6ce",
                        "on-tertiary-fixed": "#001a42",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#e0e3e5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "1rem",
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "sm": "0.5rem",
                        "base": "4px",
                        "xs": "0.25rem",
                        "container-margin": "clamp(1rem, 5vw, 2.5rem)",
                        "grid-gutter": "1rem"
                    },
                    "fontFamily": {
                        "keypad-label": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2-ui": ["Space Grotesk"],
                        "h1-ui": ["Space Grotesk"],
                        "math-inline": ["Newsreader"],
                        "body-main": ["Inter"],
                        "display-math": ["Newsreader"]
                    },
                    "fontSize": {
                        "keypad-label": ["1.25rem", { "lineHeight": "1", "fontWeight": "500" }],
                        "label-caps": ["0.75rem", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2-ui": ["1.5rem", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "h1-ui": ["2rem", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "math-inline": ["1.125rem", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-main": ["1rem", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-math": ["2.5rem", { "lineHeight": "1.2", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-main text-body-main antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-['Space_Grotesk'] tracking-tight docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto z-50 sticky">
<div class="flex items-center gap-3">
<span aria-hidden="true" class="material-symbols-outlined text-primary" data-icon="function">function</span>
<span class="text-xl font-bold text-slate-900 dark:text-white">MathSolver</span>
</div>
<button class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors px-4 py-2 rounded flex items-center gap-2">
            Help
        </button>
</header>
<div class="flex flex-1 max-w-7xl mx-auto w-full relative">
<!-- NavigationDrawer -->
<nav class="bg-white dark:bg-slate-950 text-blue-600 dark:text-blue-400 font-['Space_Grotesk'] font-medium h-full w-64 border-r border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-none hidden md:flex flex-col fixed left-0 top-0 h-screen z-40 pt-24 px-4 gap-2">
<div class="px-4 py-2 text-sm text-slate-500 dark:text-slate-400 font-label-caps uppercase tracking-wider mb-2">Menu</div>
<a class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-DEFAULT" href="#">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
                Solver
            </a>
<a class="flex items-center gap-3 px-4 py-3 bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 rounded-lg Active: opacity-80 transition-all Active: scale-95 duration-150 rounded-DEFAULT" href="#">
<span class="material-symbols-outlined" data-icon="cleaning_services">cleaning_services</span>
                Sweeper
            </a>
</nav>
<!-- Main Content Area -->
<main class="flex-1 md:ml-64 w-full p-container-margin md:p-xl flex justify-center items-start">
<div class="w-full max-w-3xl bg-surface-container-lowest border border-outline-variant rounded-xl p-md md:p-xl">
<header class="mb-xl border-b border-outline-variant pb-md">
<h1 class="font-h1-ui text-h1-ui text-on-surface">Configure Your Sweep</h1>
<p class="text-on-surface-variant mt-sm">Define parameters to visualize functional behavior over a set domain.</p>
</header>
<form class="space-y-xl">
<!-- Select Sweeper -->
<section>
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-md">Select Sweeper Variable</h2>
<div class="flex gap-md flex-wrap">
<button class="px-lg py-sm rounded-full border-2 border-primary text-primary font-math-inline text-math-inline focus:ring-2 focus:ring-primary focus:ring-offset-2 bg-primary-fixed-dim shadow-sm flex items-center justify-center min-w-[3rem]" type="button">
                                t
                            </button>
<button class="px-lg py-sm rounded-full border border-outline-variant text-on-surface-variant font-math-inline text-math-inline hover:bg-surface-container hover:border-outline focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center justify-center min-w-[3rem] transition-colors" type="button">
                                x
                            </button>
<button class="px-lg py-sm rounded-full border border-outline-variant text-on-surface-variant font-math-inline text-math-inline hover:bg-surface-container hover:border-outline focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center justify-center min-w-[3rem] transition-colors" type="button">
                                y
                            </button>
</div>
</section>
<!-- Fixed Values Input -->
<section class="bg-surface-container-low p-md rounded-lg border border-surface-variant">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-md">Fixed Constants</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="flex flex-col gap-xs">
<label class="font-math-inline text-math-inline text-on-surface" for="const-v">v</label>
<input class="border border-outline-variant rounded bg-surface-container-lowest p-sm font-math-inline text-math-inline text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow w-full" id="const-v" type="number" value="10"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-math-inline text-math-inline text-on-surface" for="const-k">k</label>
<input class="border border-outline-variant rounded bg-surface-container-lowest p-sm font-math-inline text-math-inline text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow w-full" id="const-k" placeholder="e.g., 0.5" type="number"/>
</div>
</div>
</section>
<!-- Range Settings -->
<section>
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-md">Range Settings (t)</h2>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-md">
<div class="flex flex-col gap-xs relative group">
<label class="text-sm font-medium text-on-surface-variant" for="range-start">Start</label>
<input class="border-l-4 border-l-transparent focus:border-l-primary border-y border-r border-outline-variant rounded-r bg-surface-container-lowest p-sm font-math-inline text-math-inline text-on-surface focus:ring-0 focus:outline-none transition-all w-full" id="range-start" type="number" value="0"/>
</div>
<div class="flex flex-col gap-xs relative group">
<label class="text-sm font-medium text-on-surface-variant" for="range-end">End</label>
<input class="border-l-4 border-l-transparent focus:border-l-primary border-y border-r border-outline-variant rounded-r bg-surface-container-lowest p-sm font-math-inline text-math-inline text-on-surface focus:ring-0 focus:outline-none transition-all w-full" id="range-end" type="number" value="100"/>
</div>
<div class="flex flex-col gap-xs relative group">
<label class="text-sm font-medium text-on-surface-variant" for="range-steps">Steps</label>
<input class="border-l-4 border-l-transparent focus:border-l-primary border-y border-r border-outline-variant rounded-r bg-surface-container-lowest p-sm font-math-inline text-math-inline text-on-surface focus:ring-0 focus:outline-none transition-all w-full" id="range-steps" type="number" value="50"/>
</div>
</div>
</section>
<!-- Generate Button -->
<div class="pt-md border-t border-outline-variant flex justify-end">
<button class="bg-secondary text-on-secondary px-xl py-md rounded font-h2-ui text-h2-ui text-sm hover:bg-on-secondary-fixed-variant transition-colors focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center gap-2 active:translate-y-[1px] shadow-sm" type="button">
<span class="material-symbols-outlined text-base" data-icon="show_chart">show_chart</span>
                            Perform Sweep &amp; Generate Plot
                        </button>
</div>
</form>
</div>
</main>
</div>
<!-- Footer -->
<footer class="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 font-['Space_Grotesk'] text-sm full-width border-t border-slate-200 dark:border-slate-800 flat no shadows w-full py-8 px-6 mt-auto flex flex-col md:flex-row justify-between items-center gap-4 z-50 relative md:ml-64 w-auto">
<div class="text-sm font-semibold text-slate-700 dark:text-slate-300">
            © 2024 MathSolver. Clinical Precision.
        </div>
<div class="flex gap-4 flex-wrap justify-center">
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Documentation</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Privacy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">Terms</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer" href="#">API</a>
</div>
</footer>
</body></html>
