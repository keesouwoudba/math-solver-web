<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MathSolver - Sweeper Configuration</title>
    <link rel="stylesheet" href="code.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:wght@400&family=Space+Grotesk:wght@500;600&display=swap"
        rel="stylesheet" />
</head>

<body class="body-main">
    <main>
        <!-- Formula Display -->
        <div class="formula-display" id="current-formula">
            <span class="formula-label">YOUR FORMULA</span>
            <div class="formula-value" id="formula-to-sweep">2*t + 3*x - 5*y = 0</div>
        </div>

        <!-- Sweeper Configuration Header -->
        <div class="configuration-section">
            <h1 class="configuration-title">Configure Your Sweep</h1>
            <p class="configuration-subtitle">Define parameters to visualize functional behavior over a set domain.</p>
        </div>

        <!-- Section: Select Sweeper Variable -->
        <section class="form-section">
            <h2 class="form-section-title">Select Sweeper Variable</h2>
            <fieldset class="sweeper-variables-grid" id="sweeper-variables-group">
                <legend class="sr-only">Sweeper Variables</legend>
                <!-- Sweeper Variable Option Template (generated dynamically or below as example) -->
                <div class="sweeper-variable-option-container">
                    <label class="sweeper-variable-option">
                        <input class="sweeper-variable-input" type="radio" name="sweeper-variable" id="sweeper-var-t"
                            value="t">
                        <span class="sweeper-variable-symbol">t</span>
                    </label>
                </div>
                <!-- Sweeper Variable Option Template -->
                <div class="sweeper-variable-option-container">
                    <label class="sweeper-variable-option">
                        <input class="sweeper-variable-input" type="radio" name="sweeper-variable" id="sweeper-var-x"
                            value="x">
                        <span class="sweeper-variable-symbol">x</span>
                    </label>
                </div>
                <!-- Sweeper Variable Option Template -->
                <div class="sweeper-variable-option-container">
                    <label class="sweeper-variable-option">
                        <input class="sweeper-variable-input" type="radio" name="sweeper-variable" id="sweeper-var-y"
                            value="y">
                        <span class="sweeper-variable-symbol">y</span>
                    </label>
                </div>
            </fieldset>

            <!-- Actions for Sweeper Variable -->
            <div id="actions-sweeper">
                <button type="button" class="pass-sweeper-button">Pass Sweeper</button>
                <div class="response-block">
                    <div class="response-indicator pending">?</div>
                    <span>Not chosen yet</span>
                </div>
            </div>
        </section>

        <!-- Section: Fixed Constants -->
        <section class="form-section form-section-alt">
            <h2 class="form-section-title">Fixed Constants</h2>
            <div class="fixed-constants-grid">
                <!-- Constants Input Fields -->
                <div id="constants-container">
                    <div class="form-field">
                        <label class="form-label math-inline" for="const-v">v</label>
                        <input class="form-input" id="const-v" type="number" value="10" />
                    </div>
                    <div class="form-field">
                        <label class="form-label math-inline" for="const-k">k</label>
                        <input class="form-input" id="const-k" type="number" placeholder="e.g., 0.5" />
                    </div>
                </div>

                <!-- Actions for Constants -->
                <div id="actions-constants">
                    <button type="button" class="pass-sweeper-button">Pass Constants</button>
                    <div class="response-block">
                        <div class="response-indicator pending">?</div>
                        <span>Not validated yet</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Range Settings -->
        <section class="form-section">
            <h2 class="form-section-title">Range Settings (t)</h2>
            <div class="range-settings-grid">
                <div class="form-input-range-wrapper">
                    <label class="form-label" for="range-start">Start</label>
                    <input class="form-input-range" id="range-start" type="number" value="0" />
                </div>
                <div class="form-input-range-wrapper">
                    <label class="form-label" for="range-end">End</label>
                    <input class="form-input-range" id="range-end" type="number" value="100" />
                </div>
                <div class="form-input-range-wrapper">
                    <label class="form-label" for="range-steps">Steps</label>
                    <input class="form-input-range" id="range-steps" type="number" value="50" />
                </div>
            </div>
        </section>

        <!-- Actions Row / Generate Button -->
        <div class="actions-row">
            <button class="primary-action-button" type="button">
                <span class="material-symbols-outlined icon" data-icon="show_chart">show_chart</span>
                Perform Sweep &amp; Generate Plot
            </button>
        </div>
    </main>

</body>

</html>
