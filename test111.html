<!DOCTYPE html>
<html>

<head>
    <title>Image Fetch Demo</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
        }

        #result-img {
            max-width: 100%;
            display: none;
            margin-top: 1rem;
            border: 1px solid #ddd;
        }

        #error {
            color: red;
            margin-top: 1rem;
        }

        #download-btn {
            display: none;
            margin-top: 0.75rem;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
        }

        button {
            padding: 0.5rem 1.25rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>Sweep Plot</h2>
    <button onclick="loadImage()">Get Image</button>
    <div id="error"></div>
    <img id="result-img" alt="sweep result" />
    <br />
    <a id="download-btn">⬇ Download Image</a>

    <script>
        async function loadImage() {
            const errEl = document.getElementById('error');
            const img = document.getElementById('result-img');
            const dlBtn = document.getElementById('download-btn');
            errEl.textContent = '';
            img.style.display = 'none';
            dlBtn.style.display = 'none';

            const res = await fetch('/api/get-image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ start: 0, end: 100, steps: 50 })
            });

            if (!res.ok) {
                const err = await res.json();
                errEl.textContent = 'Error: ' + err.error;
                return;
            }

            const blob = await res.blob();
            const url = URL.createObjectURL(blob);

            img.src = url;
            img.style.display = 'block';

            // reuse the SAME blob URL for download
            dlBtn.href = url;
            dlBtn.download = 'sweep_result.png';
            dlBtn.style.display = 'inline-block';
        }
    </script>
</body>

</html>
