<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSolver</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:wght@400&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <script src="app.js" defer type="module"></script>
    <link href="./dist/output.css" rel="stylesheet">


</head>

<body class="min-h-screen flex flex-col">
    <header
        class="bg-slate-50 dark:bg-slate-900 docked full-width top-0 border-b border-slate-200 dark:border-slate-800 flat no shadows font-['Space_Grotesk'] tracking-tight">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-9xl mx-auto">
            <div class="flex items-center gap-2">
                <span aria-hidden="true" class="material-symbols-outlined text-slate-800 dark:text-slate-100"
                    data-icon="function">function</span>
                <a href="/"><span class="text-xl font-bold text-slate-900 dark:text-white">MathSolver</span></a>
            </div>
            <div>
                <a class="navlink text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                    href="#help">Help</a>
            </div>
        </div>
    </header>
    <main class="flex-1 flex">
    </main>

    <template id="main-page-template">
        <section class="hero">
            <h1 class="hero-title">Computational Confidence.</h1>
            <p class="hero-copy">
                Engineered for intellectual rigor. Visualize equations, analyze behavior,
                and solve complex formulas step-by-step with clinical precision.
            </p>
        </section>
        <section class="window-launch-solver">
            <a class="box-launch-solver" href="/solver" tabindex="0" aria-label="Launch Equation Solver">
                <h2 class="solver-title">Equation Solver</h2>
                <p class="solver-description">
                    Solve complex formulas step-by-step. Uncover the underlying logic with
                    transparent computational pathways.
                </p>
                <p class="solver-cta">
                    <span class="solver-cta-label">Launch Solver</span>
                    <span class="material-symbols-outlined solver-cta-icon" data-icon="arrow_forward"
                        aria-hidden="true">arrow_forward</span>
                </p>
            </a>
        </section>
    </template>
    <template id="ui-popup-template">
        <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
            <div class="window" role="alertdialog" aria-modal="true" aria-labelledby="title"
                aria-describedby="your-message">
                <div class="icon"></div>
                <h2 id="title"></h2>
                <div id="your-message">
                    hello
                </div>
                <button class="close-btn" id="closeError">OK</button>
            </div>
        </div>
    </template>


    <template id="solver-variables-template">
        <section class="variables-page" aria-label="Variable selection">
            <div class="variables-card">
                <div class="formula-display" id="current-formula">
                    <span class="formula-label">CURRENT FORMULA</span>
                    <div class="formula-value" id="formula-value"></div>
                </div>
                <div class="variables-section">
                    <h1 class="variables-title">Choose Variable to Solve For</h1>
                    <p class="variables-subtitle">
                        Select the variable you want to isolate. The engine will rearrange the equation accordingly.
                    </p>
                    <fieldset class="variables-grid" id="variables-group">
                        <legend class="sr-only">Variables</legend>
                        <!-- variables to be inserted here -->
                    </fieldset>
                </div>
                <div class="actions-row">
                    <button class="btn-back" id="btn-back" type="button">
                        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                        Back
                    </button>
                    <button class="btn-solve" id="btn-solve" type="button">
                        Solve
                        <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                    </button>
                </div>
            </div>
        </section>
    </template>
    <template id="variable-option-template">
        <div id="variable-option-container">
            <label class="variable-option">
                <input class="variable-input" type="radio" name="variable" id="" value="">
                <span class="variable-symbol"></span>
            </label>
        </div>
    </template>

    <footer
        class="bg-slate-50 dark:bg-slate-900 full-width border-t border-slate-200 dark:border-slate-800 flat no shadows font-['Space_Grotesk'] w-full py-3 px-4 sm:py-4 sm:px-5 md:py-6 md:px-6 lg:py-8 mt-auto flex flex-col md:flex-row justify-between items-center gap-2 sm:gap-3 md:gap-4 lg:gap-6">
        <div class="text-xs sm:text-sm font-semibold text-slate-700 dark:text-slate-300">© 2026 MathSolver. All rights
            reserved.</div>
        <nav class="flex flex-wrap justify-center gap-2 sm:gap-3 md:gap-4 lg:gap-6 text-xs sm:text-sm">
            <a class="navlink text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="/docs">Documentation</a>
            <a class="navlink text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="/terms">Terms</a>
            <a class="navlink text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="/contacts">Contacts</a>
            <a class="navlink text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 underline transition-all cursor-pointer"
                href="/bug">Report a Bug</a>
        </nav>
    </footer>
</body>

</html>
